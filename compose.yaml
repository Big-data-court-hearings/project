services:
  # 1. Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 2. Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.coordinator=WARN,org.apache.kafka=WARN"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s       # Relaxed slightly to give your system breathing room
      timeout: 5s
      retries: 5
    depends_on:
      - zookeeper

  # NEW: Topic Creator Service
  init-kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command: >-
      bash -c "
      kafka-topics --bootstrap-server kafka:29092
      --create --if-not-exists
      --topic bronze
      --replication-factor 1
      --partitions 1
      && echo 'Topic bronze created!'"

  # 3. Your QuixStreams Ingestion Pipeline
  court_hearings_bdt:
    build: .
    image: court_hearings:1.0       
    container_name: court_hearings_bdt
    environment:
      - KAFKA_BROKER=kafka:29092
    volumes:
      - .:/app
    # FIXED NO TTY SURVIVAL METHOD:
    # Since TTY is gone, tailing dev/null keeps the container awake silently in the background
    # without crashing or expecting a human keyboard terminal session.
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully